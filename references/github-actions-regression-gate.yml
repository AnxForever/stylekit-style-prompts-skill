name: StyleKit Skill Regression Gate

on:
  pull_request:
  workflow_dispatch:

jobs:
  regression-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run smoke test
        run: |
          python3 path/to/stylekit-style-prompts/scripts/smoke_test.py

      - name: Run benchmark regression gate
        run: |
          bash path/to/stylekit-style-prompts/scripts/ci_regression_gate.sh \
            --baseline path/to/stylekit-style-prompts/references/benchmark-baseline.json \
            --snapshot-out path/to/stylekit-style-prompts/tmp/benchmark-ci-latest.json
